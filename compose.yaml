services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: propertyscan
      POSTGRES_PASSWORD: propertyscan
      POSTGRES_DB: propertyscan
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propertyscan"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: propertyscan
      MINIO_ROOT_PASSWORD: propertyscan-dev-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 propertyscan propertyscan-dev-secret &&
      mc mb --ignore-existing local/propertyscan-dev
      "

volumes:
  pgdata:
  miniodata:
